<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Twende Pamoja Organization</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:
linear-gradient(rgba(0,0,0,0.45),
rgba(0,0,0,0.45)),
url("IMG-20251220-WA0027.jpg");

background-size:cover;
background-position:center;
background-repeat:no-repeat;

height:100vh;

}

/* Navigation */

nav{

display:flex;
justify-content:space-between;
align-items:center;

padding:18px 40px;

background:rgba(0,0,0,0.4);

backdrop-filter:blur(10px);

}

.logo{

color:white;
font-size:28px;
font-weight:bold;

}

nav ul{

display:flex;
list-style:none;

}

nav ul li{

margin-left:30px;

}

nav ul li a{

text-decoration:none;
color:white;
font-size:18px;
font-weight:bold;

transition:0.3s;

}

nav ul li a:hover{

color:#FFD700;

}

/* Hero section */

.hero{

height:85vh;

display:flex;
justify-content:center;
align-items:center;
text-align:center;

padding:20px;

}

.content{

background:rgba(255,255,255,0.12);

padding:40px;

border-radius:25px;

backdrop-filter:blur(12px);

max-width:700px;

}

.content h1{

font-size:55px;

color:white;

margin-bottom:20px;

}

.content span{

color:#FFD700;

}

.content p{

font-size:22px;

color:#f1f1f1;

line-height:1.7;

margin-bottom:30px;

}

/* Buttons */

.btn{

display:inline-block;

padding:14px 28px;

background:#FFD700;

color:#000;

font-weight:bold;

text-decoration:none;

border-radius:30px;

margin:10px;

transition:0.3s;

}

.btn:hover{

transform:scale(1.08);

}

.btn2{

background:transparent;

color:white;

border:2px solid white;

}

.btn2:hover{

background:white;

color:black;

}

</style>

</head>

<body>

<nav>

<div class="logo">

Twende Pamoja org.

</div>

<ul>

<li><a href="home.html">Home</a></li>

<li><a href="members.html">Members</a></li>

<li><a href="about.html">About</a></li>
<li><a href="activities.html">Activities</a></li>

</ul>

</nav>


<section class="hero">

<div class="content">

<h1>

Welcome  <br>

<span>Twende Pamoja Organization</span>

</h1>

<p>

supporting, enlighten,unite

</p>

<a href="about.html" class="btn">

Learn More

</a>

<a href="members.html" class="btn btn2">

Our Members

</a>
<a href="activities.html" class="btn">our activities</a>

</div>

</section>

</body>

</html>
